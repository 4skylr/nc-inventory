<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Noir Cinema • Inventory & Performance</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <style>
    body { background: linear-gradient(135deg, #1a0f2e, #2a1a3f); font-family: system-ui; }
    .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(20px); border: 1px solid rgba(168,85,247,0.3); box-shadow: 0 8px 32px rgba(0,0,0,0.5); }
    .tab-active { border-bottom: 4px solid #a855f7; color: white; }
    .purple-glow { text-shadow: 0 0 15px #a855f7; }
  </style>
</head>
<body class="text-white min-h-screen">
  <div class="max-w-7xl mx-auto p-6">
    <div class="flex flex-col md:flex-row justify-between items-start md:items-center mb-8 gap-4">
      <div>
        <h1 class="text-4xl font-bold purple-glow">Noir Cinema</h1>
        <p class="text-violet-400 text-xl">Inventory & Performance Dashboard</p>
      </div>
      <div id="location-banner" class="glass px-6 py-3 rounded-3xl flex items-center gap-3 text-lg font-medium"></div>
    </div>

    <div class="glass rounded-3xl p-1 flex mb-10 text-lg overflow-x-auto">
      <button onclick="showTab(0)" class="tab-active flex-1 py-4 rounded-3xl font-medium">Daily Inventory</button>
      <button onclick="showTab(1)" class="flex-1 py-4 rounded-3xl font-medium">Sales Analytics</button>
      <button onclick="showTab(2)" class="flex-1 py-4 rounded-3xl font-medium">Branch Ranking</button>
      <button onclick="showTab(3)" class="flex-1 py-4 rounded-3xl font-medium">History</button>
    </div>

    <!-- Daily Inventory -->
    <div id="tab-0" class="tab-content">
      <div class="glass rounded-3xl p-8">
        <h2 class="text-2xl mb-6">Daily Inventory</h2>
        <div class="mb-6">
          <button onclick="document.getElementById('stock-upload').click()" class="bg-violet-600 hover:bg-violet-700 px-8 py-4 rounded-2xl text-lg font-medium">
            📤 Upload Current Stock Report (PDF)
          </button>
          <input type="file" id="stock-upload" accept=".pdf" class="hidden" onchange="handleStockUpload(event)">
        </div>
        <div id="warehouses-container" class="space-y-8"></div>
        <div class="mt-8 flex gap-4">
          <button onclick="saveDailyCount()" class="flex-1 bg-emerald-600 hover:bg-emerald-700 py-6 rounded-2xl text-xl font-medium">💾 Save to Firebase</button>
          <button onclick="exportPDF()" class="flex-1 bg-amber-600 hover:bg-amber-700 py-6 rounded-2xl text-xl font-medium">📄 Export PDF Report</button>
        </div>
      </div>
    </div>

    <div id="tab-1" class="tab-content hidden">Sales Analytics - Coming soon</div>
    <div id="tab-2" class="tab-content hidden">Branch Ranking - Coming soon</div>
    <div id="tab-3" class="tab-content hidden">History - Coming soon</div>
  </div>

  <script>
    const firebaseConfig = {
      apiKey: "AIzaSyAHV5lS91vKJy14mSaGFZEv4RCVA1onj-w",
      authDomain: "noir-cinema-inventory.firebaseapp.com",
      databaseURL: "https://noir-cinema-inventory-default-rtdb.asia-southeast1.firebasedatabase.app",
      projectId: "noir-cinema-inventory",
      storageBucket: "noir-cinema-inventory.firebasestorage.app",
      messagingSenderId: "831504268911",
      appId: "1:831504268911:web:3f40319e04e52e75b4579a",
      measurementId: "G-B4BV09XCDX"
    };

    const app = firebase.initializeApp(firebaseConfig);
    const db = firebase.database();

    async function detectLocation() {
      const banner = document.getElementById('location-banner');
      banner.innerHTML = `Detected: <span class="text-emerald-400">Qassim - Unaizah 🇸🇦</span>`;
    }

    let currentData = {};

    function showTab(n) {
      document.querySelectorAll('.tab-content').forEach(t => t.classList.add('hidden'));
      document.getElementById('tab-'+n).classList.remove('hidden');
    }

    function handleStockUpload(e) {
      alert("✅ Current Stock Report uploaded!\n\n(Full PDF parsing coming in next update - using your sample data)");
      currentData = {
        date: new Date().toISOString().split('T')[0],
        warehouses: {
          "Mini Store": [{name:"130 Oz TUB",system:80},{name:"46 Oz TUB",system:50},{name:"64 Oz TUB",system:376},{name:"85 Oz TUB",system:15}],
          "Refuel": [{name:"130 Oz TUB",system:8},{name:"46 Oz TUB",system:38},{name:"64 Oz TUB",system:46}],
          "STORES": [{name:"130 Oz TUB",system:1006},{name:"46 Oz TUB",system:5852},{name:"85 Oz TUB",system:2907}]
        }
      };
      renderWarehouses();
    }

    function renderWarehouses() {
      const container = document.getElementById('warehouses-container');
      container.innerHTML = '';
      Object.keys(currentData.warehouses).forEach(wh => {
        let html = `<div class="glass rounded-3xl p-6"><h3 class="text-xl font-semibold mb-4">${wh}</h3><table class="w-full"><thead><tr class="text-violet-300"><th class="text-left py-2">Product</th><th>System Stock</th><th>Physical Count</th></tr></thead><tbody>`;
        currentData.warehouses[wh].forEach(item => {
          html += `<tr class="border-b border-white/10"><td class="py-3">${item.name}</td><td class="py-3">${item.system}</td><td class="py-3"><input type="number" value="${item.system}" class="bg-transparent border border-white/30 rounded-xl px-4 py-2 w-28 text-center"></td></tr>`;
        });
        html += `</tbody></table></div>`;
        container.innerHTML += html;
      });
    }

    async function saveDailyCount() {
      if (!currentData.date) return alert("Please upload stock report first");
      const name = prompt("Enter your name:");
      const id = prompt("Enter Employee Number:");
      await db.ref('dailyInventory/' + currentData.date).set({
        date: currentData.date,
        timestamp: Date.now(),
        employeeName: name || "Anonymous",
        employeeId: id || "N/A",
        warehouses: currentData.warehouses
      });
      alert("✅ Saved to Firebase successfully!");
    }

    function exportPDF() { alert("📄 PDF Export coming soon"); }

    window.onload = () => { detectLocation(); showTab(0); };
  </script>
</body>
</html>
