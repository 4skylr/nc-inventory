<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Noir Cinema • Inventory & Performance</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.0/firebase-database-compat.js"></script>
  <style>
    :root { --noir-purple: #7A2A90; }
    body { background: linear-gradient(135deg, #1a0f2e, #2a1a3f); }
    .glass { background: rgba(255,255,255,0.08); backdrop-filter: blur(20px); border: 1px solid rgba(122,42,144,0.35); }
    .logo-circle {
      width: 72px; height: 72px;
      background: #7A2A90;
      border-radius: 9999px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 36px;
      border: 5px solid rgba(255,255,255,0.25);
      box-shadow: 0 0 35px #7A2A90;
      position: relative;
    }
    .purple-glow { text-shadow: 0 0 25px #7A2A90; }
  </style>
</head>
<body class="text-white min-h-screen pb-12">
  <div class="max-w-7xl mx-auto px-4 sm:px-6 pt-6">
    <!-- Header - Official Brand Logo -->
    <div class="flex justify-between items-center mb-10">
      <div class="flex items-center gap-4">
        <!-- Official Logo Circle -->
        <div class="logo-circle">🕴️</div>
        <div>
          <h1 class="text-4xl sm:text-5xl font-bold tracking-[-1px] purple-glow">Noir Cinema</h1>
          <p class="text-[#7A2A90] text-2xl font-medium -mt-1">نوار سينما</p>
        </div>
      </div>
      <div id="location-banner" class="glass px-6 py-3 rounded-3xl text-lg font-medium"></div>
